name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1
        with:
          args: "check ."
      - uses: astral-sh/ruff-action@v1
        with:
          args: "format --check ."

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=image_organizer --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Single required status check that passes only when every matrix job passes.
  # In GitHub branch protection, add "tests-pass" as the required check —
  # you don't need to list every Python version individually.
  tests-pass:
    name: Tests pass
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: All matrix jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more test jobs failed."
            exit 1
          fi
